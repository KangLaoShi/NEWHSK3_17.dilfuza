        function VocabQuiz() {
            const [questions, setQuestions] = useState([]);
            const [userAnswers, setUserAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [score, setScore] = useState(0);

            useEffect(() => {
                const generated = VOCAB_DATA.map(word => {
                let options = [word.uz];
                let availableOptions = VOCAB_DATA.filter(w => w.id !== word.id).map(w => w.uz);
                availableOptions.sort(() => 0.5 - Math.random());
                options.push(availableOptions[0], availableOptions[1], availableOptions[2]);
                options.sort(() => 0.5 - Math.random());
                
                return {
                    id: word.id,
                    q: word.cn,
                    options: options,
                    ans: options.indexOf(word.uz),
                    correctText: word.uz
                };
                });
                generated.sort(() => 0.5 - Math.random());
                setQuestions(generated);
            }, []);

            const handleSelect = (qIndex, oIndex) => {
                if(showResults) return;
                setUserAnswers(prev => ({ ...prev, [qIndex]: oIndex }));
            };

            const handleSubmit = () => {
                let currentScore = 0;
                questions.forEach((q, index) => {
                if (userAnswers[index] === q.ans) currentScore++;
                });
                setScore(currentScore);
                setShowResults(true);
            };

            const handleRestart = () => {
                setUserAnswers({});
                setShowResults(false);
                setScore(0);
                setQuestions([...questions].sort(() => 0.5 - Math.random()));
            };

            return (
                <div className="max-w-3xl mx-auto">
                <h2 className="text-2xl font-bold text-amber-400 mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                    <Edit3 size={24} className="text-amber-500" /> Lug'at Testi (30 savol)
                </h2>

                {showResults && (
                    <div className="bg-indigo-900/50 border border-indigo-400 p-6 rounded-2xl text-center mb-8 shadow-lg">
                    <h3 className="text-3xl font-bold text-white mb-2">Natija: {score} / {questions.length}</h3>
                    <p className="text-indigo-200">
                        {score === questions.length ? "Mukammal! Siz hamma so'zlarni bilasiz!" : 
                        score > 20 ? "Juda yaxshi! Kichik xatolar bor xolos." : 
                        "Yana biroz takrorlash kerak."}
                    </p>
                    </div>
                )}

                <div className="space-y-8">
                    {questions.map((q, qIndex) => (
                    <div key={qIndex} className="bg-white/5 p-6 rounded-2xl border border-white/10">
                        <h3 className="text-4xl font-bold text-center mb-6 text-white">{q.q}</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {q.options.map((opt, oIndex) => {
                            const isSelected = userAnswers[qIndex] === oIndex;
                            const isCorrect = q.ans === oIndex;
                            
                            let btnClass = "p-4 rounded-xl text-left transition-all border outline-none font-medium flex justify-between items-center ";
                            if (!showResults) {
                            btnClass += isSelected 
                                ? "bg-amber-500/20 border-amber-400 text-amber-300" 
                                : "bg-white/5 border-transparent text-slate-300 hover:bg-white/10 hover:border-white/20";
                            } else {
                            if (isCorrect) {
                                btnClass += "bg-green-500/20 border-green-500 text-green-300";
                            } else if (isSelected && !isCorrect) {
                                btnClass += "bg-red-500/20 border-red-500 text-red-300";
                            } else {
                                btnClass += "bg-white/5 border-transparent text-slate-500 opacity-50";
                            }
                            }

                            return (
                            <button
                                key={oIndex}
                                onClick={() => handleSelect(qIndex, oIndex)}
                                disabled={showResults}
                                className={btnClass}
                            >
                                <span>{opt}</span>
                                {showResults && isCorrect && <CheckCircle size={20} className="text-green-400" />}
                                {showResults && isSelected && !isCorrect && <XCircle size={20} className="text-red-400" />}
                            </button>
                            )
                        })}
                        </div>
                    </div>
                    ))}
                </div>

                <div className="mt-8 text-center">
                    {!showResults ? (
                    <button 
                        onClick={handleSubmit}
                        disabled={Object.keys(userAnswers).length !== questions.length}
                        className="px-8 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-full disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-[0_0_15px_rgba(245,158,11,0.3)] text-lg"
                    >
                        Natijani ko'rish
                    </button>
                    ) : (
                    <button 
                        onClick={handleRestart}
                        className="px-8 py-4 bg-indigo-500 hover:bg-indigo-400 text-white font-bold rounded-full transition-all text-lg"
                    >
                        Qaytadan ishlash
                    </button>
                    )}
                </div>
                </div>
            );
        }

        function Dialogues({ playAudio }) {
            const [activeDialog, setActiveDialog] = useState(0);

            return (
                <div className="max-w-4xl mx-auto">
                <h2 className="text-2xl font-bold text-amber-400 mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                    <MessageCircle size={24} className="text-amber-500" /> Muloqot (Dialoglar)
                </h2>

                <div className="flex flex-wrap gap-2 mb-8 justify-center">
                    {DIALOGUES.map((dialog, index) => (
                    <button
                        key={index}
                        onClick={() => setActiveDialog(index)}
                        className={`px-5 py-2 rounded-full font-medium transition-all ${
                        activeDialog === index
                            ? 'bg-indigo-500 text-white shadow-lg'
                            : 'bg-white/10 text-slate-300 hover:bg-white/20'
                        }`}
                    >
                        {dialog.title}
                    </button>
                    ))}
                </div>

                <div className="bg-slate-800/50 rounded-2xl p-6 md:p-8 border border-white/10">
                    <div className="bg-amber-900/30 border border-amber-500/20 text-amber-200 p-4 rounded-xl mb-8 italic text-sm md:text-base text-center">
                    {DIALOGUES[activeDialog].context}
                    </div>

                    <div className="space-y-6">
                    {DIALOGUES[activeDialog].lines.map((line, index) => (
                        <div key={index} className="flex flex-col md:flex-row gap-4 bg-white/5 p-4 rounded-xl border border-white/5 hover:border-indigo-500/30 transition-colors group">
                        <div className="md:w-1/4 flex-shrink-0 flex items-start justify-between md:justify-start gap-2">
                            <span className="font-bold text-indigo-300 text-lg">{line.speaker}:</span>
                            <button 
                            onClick={() => playAudio(line.cn)}
                            className="p-2 bg-indigo-500/20 hover:bg-indigo-500/50 rounded-full text-indigo-300 transition-colors"
                            title="Tinglash"
                            >
                            <Volume2 size={16} />
                            </button>
                        </div>
                        <div className="md:w-3/4 space-y-2">
                            <p className="text-2xl font-medium text-white">{line.cn}</p>
                            <p className="text-lg text-indigo-200/80">{line.pinyin}</p>
                            <div className="mt-3 space-y-1 text-sm border-t border-white/5 pt-3">
                            <p className="text-amber-200"><span className="font-semibold mr-2 opacity-70">UZ:</span>{line.uz}</p>
                            <p className="text-slate-300"><span className="font-semibold mr-2 opacity-70">RU:</span>{line.ru}</p>
                            <p className="text-slate-400"><span className="font-semibold mr-2 opacity-70">EN:</span>{line.en}</p>
                            </div>
                        </div>
                        </div>
                    ))}
                    </div>
                </div>
                </div>
            );
        }

        function Grammar({ playAudio }) {
            return (
                <div className="max-w-4xl mx-auto space-y-8">
                <h2 className="text-2xl font-bold text-amber-400 mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                    <GraduationCap size={24} className="text-amber-500" /> Grammatika (Qoidalar)
                </h2>

                {GRAMMAR_DATA.map((item) => (
                    <div key={item.id} className="bg-gradient-to-br from-slate-800 to-indigo-950/50 rounded-2xl p-6 border border-white/10 shadow-lg">
                    <h3 className="text-xl font-bold text-indigo-300 mb-4">{item.title}</h3>
                    
                    <div className="space-y-2 mb-6 text-sm bg-black/20 p-4 rounded-xl border border-white/5">
                        <p className="text-amber-200"><span className="font-bold mr-2">UZ:</span>{item.descUz}</p>
                        <p className="text-slate-300"><span className="font-bold mr-2">RU:</span>{item.descRu}</p>
                        <p className="text-slate-400"><span className="font-bold mr-2">EN:</span>{item.descEn}</p>
                    </div>

                    <div className="space-y-4">
                        <h4 className="text-amber-500 font-semibold mb-2">Misollar (Examples):</h4>
                        {item.examples.map((ex, idx) => (
                        <div key={idx} className="bg-white/5 p-4 rounded-xl flex items-start gap-4 hover:bg-white/10 transition-colors">
                            <button 
                            onClick={() => playAudio(ex.cn)}
                            className="mt-1 p-2 bg-indigo-500/20 hover:bg-indigo-500 text-indigo-300 hover:text-white rounded-full transition-colors flex-shrink-0"
                            >
                            <Play size={14} className="ml-0.5" />
                            </button>
                            <div>
                            <p className="text-lg text-white font-medium">{ex.cn}</p>
                            <p className="text-indigo-200 mt-1">{ex.pinyin}</p>
                            <p className="text-amber-100/80 text-sm mt-2">{ex.uz}</p>
                            </div>
                        </div>
                        ))}
                    </div>
                    </div>
                ))}
                </div>
            );
        }

        function GrammarQuiz() {
            const [userAnswers, setUserAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [score, setScore] = useState(0);

            const handleSelect = (qIndex, oIndex) => {
                if(showResults) return;
                setUserAnswers(prev => ({ ...prev, [qIndex]: oIndex }));
            };

            const handleSubmit = () => {
                let currentScore = 0;
                GRAMMAR_QUIZ.forEach((q, index) => {
                if (userAnswers[index] === q.ans) currentScore++;
                });
                setScore(currentScore);
                setShowResults(true);
            };

            const handleRestart = () => {
                setUserAnswers({});
                setShowResults(false);
                setScore(0);
            };

            return (
                <div className="max-w-3xl mx-auto">
                <h2 className="text-2xl font-bold text-amber-400 mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                    <CheckSquare size={24} className="text-amber-500" /> Grammatika Testi
                </h2>

                {showResults && (
                    <div className="bg-indigo-900/50 border border-indigo-400 p-6 rounded-2xl text-center mb-8 shadow-lg">
                    <h3 className="text-3xl font-bold text-white mb-2">Natija: {score} / {GRAMMAR_QUIZ.length}</h3>
                    <p className="text-indigo-200">
                        {score === GRAMMAR_QUIZ.length ? "Mukammal!" : score > 10 ? "Yaxshi natija!" : "Qoidalarni qayta o'qing."}
                    </p>
                    </div>
                )}

                <div className="space-y-6">
                    {GRAMMAR_QUIZ.map((q, qIndex) => (
                    <div key={qIndex} className="bg-white/5 p-5 rounded-2xl border border-white/10">
                        <p className="text-lg text-white mb-4"><span className="font-bold text-indigo-400 mr-2">{q.id}.</span> {q.q}</p>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {q.options.map((opt, oIndex) => {
                            const isSelected = userAnswers[qIndex] === oIndex;
                            const isCorrect = q.ans === oIndex;
                            
                            let btnClass = "py-3 px-4 rounded-xl text-center transition-all border outline-none font-medium ";
                            if (!showResults) {
                            btnClass += isSelected 
                                ? "bg-amber-500 text-slate-900 border-amber-400" 
                                : "bg-white/5 border-white/10 text-slate-300 hover:bg-white/10 hover:border-white/30";
                            } else {
                            if (isCorrect) {
                                btnClass += "bg-green-500 border-green-400 text-white shadow-[0_0_10px_rgba(34,197,94,0.3)]";
                            } else if (isSelected && !isCorrect) {
                                btnClass += "bg-red-500/80 border-red-400 text-white";
                            } else {
                                btnClass += "bg-white/5 border-transparent text-slate-500 opacity-50";
                            }
                            }

                            return (
                            <button
                                key={oIndex}
                                onClick={() => handleSelect(qIndex, oIndex)}
                                disabled={showResults}
                                className={btnClass}
                            >
                                {opt}
                            </button>
                            )
                        })}
                        </div>
                    </div>
                    ))}
                </div>

                <div className="mt-8 text-center">
                    {!showResults ? (
                    <button 
                        onClick={handleSubmit}
                        disabled={Object.keys(userAnswers).length !== GRAMMAR_QUIZ.length}
                        className="px-8 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-full disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-[0_0_15px_rgba(245,158,11,0.3)] text-lg"
                    >
                        Natijani ko'rish
                    </button>
                    ) : (
                    <button 
                        onClick={handleRestart}
                        className="px-8 py-4 bg-indigo-500 hover:bg-indigo-400 text-white font-bold rounded-full transition-all text-lg"
                    >
                        Qaytadan ishlash
                    </button>
                    )}
                </div>
                </div>
            );
        }

        function FillBlanks() {
            const [userAnswers, setUserAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [score, setScore] = useState(0);

            const options = Array.from(new Set(FILL_BLANK_QUESTIONS.map(q => q.answer))).sort();

            const handleSelect = (qId, val) => {
                if(showResults) return;
                setUserAnswers(prev => ({ ...prev, [qId]: val }));
            };

            const handleSubmit = () => {
                let currentScore = 0;
                FILL_BLANK_QUESTIONS.forEach(q => {
                if (userAnswers[q.id] === q.answer) currentScore++;
                });
                setScore(currentScore);
                setShowResults(true);
            };

            const handleRestart = () => {
                setUserAnswers({});
                setShowResults(false);
                setScore(0);
            };

            return (
                <div className="max-w-4xl mx-auto">
                <h2 className="text-2xl font-bold text-amber-400 mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                    <FileText size={24} className="text-amber-500" /> So'zlarni to'ldirish
                </h2>

                <div className="bg-indigo-950/40 p-6 rounded-2xl border border-indigo-500/20 mb-8">
                    <h3 className="text-indigo-300 font-semibold mb-3">Tanlash uchun so'zlar:</h3>
                    <div className="flex flex-wrap gap-2">
                    {options.map((opt, i) => (
                        <span key={i} className="px-3 py-1 bg-indigo-900 text-indigo-100 rounded-lg text-sm border border-indigo-700">
                        {opt}
                        </span>
                    ))}
                    </div>
                </div>

                {showResults && (
                    <div className="bg-indigo-900/50 border border-indigo-400 p-6 rounded-2xl text-center mb-8 shadow-lg">
                    <h3 className="text-3xl font-bold text-white mb-2">Natija: {score} / {FILL_BLANK_QUESTIONS.length}</h3>
                    </div>
                )}

                <div className="space-y-4">
                    {FILL_BLANK_QUESTIONS.map((q) => {
                    const parts = q.text.split("___");
                    const isCorrect = showResults && userAnswers[q.id] === q.answer;
                    const isWrong = showResults && userAnswers[q.id] && userAnswers[q.id] !== q.answer;

                    return (
                        <div key={q.id} className="bg-white/5 p-4 rounded-xl border border-white/5 flex flex-col md:flex-row items-center gap-3">
                        <span className="font-bold text-indigo-400 md:w-8 flex-shrink-0 text-center">{q.id}.</span>
                        <div className="text-lg leading-relaxed text-slate-200 w-full flex-wrap flex items-center">
                            <span>{parts[0]}</span>
                            
                            <select
                            disabled={showResults}
                            value={userAnswers[q.id] || ""}
                            onChange={(e) => handleSelect(q.id, e.target.value)}
                            className={`mx-2 bg-slate-800 text-amber-400 border font-bold px-3 py-1 rounded-lg outline-none transition-colors appearance-none min-w-[100px] text-center cursor-pointer ${
                                showResults
                                ? isCorrect 
                                    ? "border-green-500 bg-green-900/30 text-green-400" 
                                    : "border-red-500 bg-red-900/30 text-red-400"
                                : "border-indigo-500 hover:border-amber-500 focus:border-amber-500 focus:ring-1 focus:ring-amber-500"
                            }`}
                            >
                            <option value="" disabled>---</option>
                            {options.map(opt => (
                                <option key={opt} value={opt}>{opt}</option>
                            ))}
                            </select>

                            <span>{parts[1]}</span>
                            
                            {showResults && isCorrect && <CheckCircle size={20} className="ml-3 text-green-400 inline" />}
                            {showResults && isWrong && <XCircle size={20} className="ml-3 text-red-400 inline" />}
                            {showResults && isWrong && <span className="ml-2 text-green-400 text-sm font-bold">({q.answer})</span>}
                        </div>
                        </div>
                    )
                    })}
                </div>

                <div className="mt-8 text-center">
                    {!showResults ? (
                    <button 
                        onClick={handleSubmit}
                        disabled={Object.keys(userAnswers).length !== FILL_BLANK_QUESTIONS.length}
                        className="px-8 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-full disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-[0_0_15px_rgba(245,158,11,0.3)] text-lg"
                    >
                        Natijani ko'rish
                    </button>
                    ) : (
                    <button 
                        onClick={handleRestart}
                        className="px-8 py-4 bg-indigo-500 hover:bg-indigo-400 text-white font-bold rounded-full transition-all text-lg"
                    >
                        Qaytadan ishlash
                    </button>
                    )}
                </div>
                </div>
            );
        }

        // --- Main App Component ---
        
        function App() {
            const [activeTab, setActiveTab] = useState('flashcards');

            const playAudio = (text) => {
                if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                window.speechSynthesis.speak(utterance);
                } else {
                alert('Your browser does not support text to speech!');
                }
            };

            const navItems = [
                { id: 'flashcards', label: 'Lug\'at', icon: BookOpen },
                { id: 'vocabQuiz', label: 'Lug\'at Testi', icon: Edit3 },
                { id: 'dialogues', label: 'Muloqot', icon: MessageCircle },
                { id: 'grammar', label: 'Grammatika', icon: GraduationCap },
                { id: 'grammarQuiz', label: 'Grammatika Testi', icon: CheckSquare },
                { id: 'fillBlanks', label: 'So\'zlarni to\'ldirish', icon: FileText }
            ];

            return (
                <div>
                    {/* Background Glows */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-amber-600/10 rounded-full blur-3xl"></div>
                        <div className="absolute top-[40%] left-[50%] translate-x-[-50%] w-[40rem] h-[40rem] bg-blue-900/10 rounded-full blur-3xl"></div>
                    </div>

                    <div className="relative z-10 max-w-5xl mx-auto px-4 py-8">
                        
                        {/* Header */}
                        <header className="mb-10 text-center">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 mb-3 drop-shadow-sm">
                            我要多向认真的人学习
                        </h1>
                        <p className="text-lg md:text-xl text-indigo-300 font-medium tracking-wide">
                            Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                        </p>
                        </header>

                        {/* Navigation Tabs */}
                        <div className="flex flex-wrap justify-center gap-2 mb-8 border-b border-white/10 pb-4">
                        {navItems.map((item) => {
                            const IconComp = item.icon;
                            return (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`flex items-center gap-2 px-4 py-2 rounded-full font-medium transition-all duration-300 ${
                                activeTab === item.id
                                    ? 'bg-amber-500 text-slate-900 shadow-[0_0_15px_rgba(245,158,11,0.4)]'
                                    : 'bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white'
                                }`}
                            >
                                <IconComp size={18} />
                                <span className="text-sm md:text-base">{item.label}</span>
                            </button>
                            )
                        })}
                        </div>

                        {/* Content Area */}
                        <main className="bg-slate-900/60 backdrop-blur-xl border border-white/10 rounded-3xl p-6 md:p-10 shadow-2xl min-h-[60vh]">
                        {activeTab === 'flashcards' && <Flashcards playAudio={playAudio} />}
                        {activeTab === 'vocabQuiz' && <VocabQuiz />}
                        {activeTab === 'dialogues' && <Dialogues playAudio={playAudio} />}
                        {activeTab === 'grammar' && <Grammar playAudio={playAudio} />}
                        {activeTab === 'grammarQuiz' && <GrammarQuiz />}
                        {activeTab === 'fillBlanks' && <FillBlanks />}
                        </main>

                        {/* Footer */}
                        <footer className="mt-12 text-center text-slate-500 text-sm pb-8 border-t border-white/5 pt-6">
                        <p>HSK 3 NEW3.0 - Lesson 17</p>
                        <p className="mt-1">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
